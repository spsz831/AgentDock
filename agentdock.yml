version: 1
project:
  name: agentdock-local
  description: Local development manifest
sources:
  - id: workspace
    type: directory
    path: ./workspace
    include:
      - '**/*.json'
      - '**/*.txt'
  - id: settings
    type: file
    path: ./workspace/settings.json
templates:
  - id: env-template
    source: ./templates/.env.example
    destination: ./.env
    variables:
      APP_NAME: agentdock-local
outputs:
  type: directory
  path: ./dist/exported
install:
  mode: package
  targetPath: ./dist/restored
  overwrite: true
options:
  includeHidden: true
  overwrite: true
