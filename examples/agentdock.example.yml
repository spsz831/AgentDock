version: 2
project:
  name: agentdock-demo
  description: Minimal demo manifest
sources:
  - id: workspace
    type: directory
    path: ./workspace
    destination: ./restored/workspace
    include:
      - '**/*.json'
      - '**/*.txt'
    exclude:
      - '**/*.bak'
  - id: settings
    type: file
    path: ./workspace/settings.json
    destination: ./restored/config/settings.json
templates:
  - id: env-template
    source: ./templates/.env.example
    destination: ./restored/.env
    variables:
      APP_NAME: agentdock-demo
      MODE: production
outputs:
  type: directory
  path: ./dist/exported
install:
  mode: package
  targetPath: ./dist/restored
  overwrite: false
options:
  includeHidden: true
  followSymlinks: true
  overwrite: false
